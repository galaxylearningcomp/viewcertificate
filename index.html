<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: white;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #1a2530;
      font-size: 32px;
      font-weight: 800;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #1a2530;
      box-shadow: 0 0 0 3px rgba(26,37,48,0.1);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #1a2530;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #2d3f52;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Certificate Generator</h1>

    <div class="form-group">
      <label>Institute Name</label>
      <input type="text" id="instituteName" placeholder="Institute Name">
    </div>

    <div class="form-group">
      <label>Student Name</label>
      <input type="text" id="studentName" placeholder="Student Name">
    </div>

    <div class="form-group">
      <label>Roll Number</label>
      <input type="text" id="rollNo" placeholder="Roll Number">
    </div>

    <div class="form-group">
      <label>Certificate Number</label>
      <input type="text" id="certificateNo" placeholder="Certificate Number">
    </div>

    <div class="form-group">
      <label>Course / Diploma</label>
      <input type="text" id="course" placeholder="Course / Diploma">
    </div>

    <div class="form-group">
      <label>Session</label>
      <input type="text" id="session" placeholder="2025 - 2026">
    </div>

    <div class="form-group">
      <label>Date of Completion</label>
      <input type="date" id="completionDate">
    </div>

    <div class="form-group">
      <label>Date of Issue</label>
      <input type="date" id="issueDate">
    </div>

    <div class="form-group">
      <label>Principal Name</label>
      <input type="text" id="principalName" placeholder="Principal Name">
    </div>

    <button onclick="generateCertificate()">
      Generate Certificate
    </button>

    <div class="footer-text">
      Generated certificates are automatically filled.
    </div>

  </div>

  <script>

    function generateCertificate() {

      const data = {
        instituteName: document.getElementById('instituteName').value,
        studentName: document.getElementById('studentName').value,
        rollNo: document.getElementById('rollNo').value,
        certificateNo: document.getElementById('certificateNo').value,
        course: document.getElementById('course').value,
        session: document.getElementById('session').value,
        completionDate: document.getElementById('completionDate').value,
        issueDate: document.getElementById('issueDate').value,
        principalName: document.getElementById('principalName').value
      };

      localStorage.setItem(
        'certificateData',
        JSON.stringify(data)
      );

      window.location.href = 'certificate.html';
    }

  </script>

</body>
</html>
