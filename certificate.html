<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate</title>

<style>

@page{
  size:A4 landscape;
  margin:0;
}

body{
  margin:0;
  background:#eee;
  font-family:Arial,sans-serif;
}

.certificate{
  width:297mm;
  height:210mm;
  background:white;
  margin:auto;
  position:relative;
  box-sizing:border-box;
  padding:40px;
}

.border{
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  bottom:20px;
  border:5px solid #111;
}

.inner{
  position:absolute;
  top:35px;
  left:35px;
  right:35px;
  bottom:35px;
  border:2px solid gold;
}

.content{
  text-align:center;
  margin-top:60px;
}

.student{
  font-size:42px;
  margin:20px 0;
  border-bottom:2px solid gold;
  display:inline-block;
  padding-bottom:10px;
}

.footer{
  position:absolute;
  bottom:40px;
  left:50px;
  right:50px;
  display:flex;
  justify-content:space-between;
  align-items:end;
}

.signature img{
  height:60px;
}

.seal img{
  height:70px;
}

.print-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 20px;
}

@media print{
  .print-btn{
    display:none;
  }
}
</style>
</head>

<body>

<button class="print-btn" onclick="window.print()">
Save PDF
</button>

<div class="certificate">

<div class="border"></div>
<div class="inner"></div>

<div class="content">

<h1 id="institute"></h1>

<p>This certifies that</p>

<div class="student" id="student"></div>

<p>has successfully completed</p>

<h2 id="course"></h2>

<p>Session: <span id="session"></span></p>

<p>
Certificate No:
<span id="certno"></span>
</p>

<p>
Roll No:
<span id="rollno"></span>
</p>

<p>
Issue Date:
<span id="issue"></span>
</p>

</div>

<div class="footer">

<div class="seal">
<img src="seal.png" alt="Seal">
</div>

<div class="signature">
<img src="signature.png" alt="Signature">
<br>
Principal
</div>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

document.getElementById("institute").textContent =
params.get("institute") || "";

document.getElementById("student").textContent =
params.get("student") || "";

document.getElementById("course").textContent =
params.get("course") || "";

document.getElementById("certno").textContent =
params.get("certno") || "";

document.getElementById("rollno").textContent =
params.get("rollno") || "";

document.getElementById("session").textContent =
params.get("session") || "";

document.getElementById("issue").textContent =
params.get("issue") || "";

</script>

</body>
</html>
