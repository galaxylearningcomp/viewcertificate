<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Generator</title>
<style>
body{
  font-family:Arial,sans-serif;
  max-width:700px;
  margin:40px auto;
  padding:20px;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
}
button{
  padding:12px 20px;
  width:100%;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>Certificate Generator</h2>

<input id="institute" placeholder="Institute Name">
<input id="student" placeholder="Student Name">
<input id="course" placeholder="Course">
<input id="certno" placeholder="Certificate Number">
<input id="rollno" placeholder="Roll Number">
<input id="session" placeholder="Session">
<input id="issue" placeholder="Issue Date">

<button onclick="generate()">Generate Certificate</button>

<script>
function generate(){

  const url =
    "certificate.html?" +
    "institute=" + encodeURIComponent(document.getElementById("institute").value) +
    "&student=" + encodeURIComponent(document.getElementById("student").value) +
    "&course=" + encodeURIComponent(document.getElementById("course").value) +
    "&certno=" + encodeURIComponent(document.getElementById("certno").value) +
    "&rollno=" + encodeURIComponent(document.getElementById("rollno").value) +
    "&session=" + encodeURIComponent(document.getElementById("session").value) +
    "&issue=" + encodeURIComponent(document.getElementById("issue").value);

  window.location.href = url;
}
</script>

</body>
</html>
